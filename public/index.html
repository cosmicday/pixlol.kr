<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pix.gg - 전적검색</title>
    <style>
        /* =========================================
           1. 기본 설정 및 레이아웃
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            color: #ffffff;
            background: url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Lulu_2.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(11, 11, 20, 0.8);
            backdrop-filter: blur(5px);
            z-index: -1;
        }

        /* =========================================
           2. 헤더 네비게이션
           ========================================= */
        .header {
            display: flex;
            align-items: center;
            background-color: rgba(45, 20, 60, 0.9);
            padding: 0 5px;
            height: 65px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-top {
            font-size: 26px;
            font-weight: 900;
            color: #ffffff;
            cursor: pointer;
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            margin-left: 0px;
        }

        .nav-item {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item:hover {
            color: #a78bfa;
        }

        .nav-item.active {
            color: #ffffff;
            font-weight: bold;
        }

        /* =========================================
           3. 메인 검색 영역
           ========================================= */
        .main-search-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            transition: all 0.4s ease;
        }

        .main-logo-img {
            height: 360px;
            margin-bottom: 0px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(167, 139, 250, 0.3));
        }

        .nav-logo-img {
            height: 60px;
            object-fit: contain;
            vertical-align: middle;
            filter: drop-shadow(0 0 5px rgba(167, 139, 250, 0.4));
            margin-top: 8px;
        }

        .search-box {
            display: flex;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-radius: 30px;
            overflow: hidden;
        }

        .search-input {
            flex: 1;
            padding: 18px 25px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        .search-btn {
            padding: 0 35px;
            background: #6b3f8e;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        /* =========================================
           4. 신화 상점 영역
           ========================================= */
        .mythic-shop-container {
            margin-top: 80px;
            width: 100%;
            max-width: 1000px;
            padding: 0 20px;
        }

        .shop-title-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .shop-title-container h3 {
            color: #ffffff;
            margin: 0;
            font-size: 19px;
            font-weight: 600;
        }

        .shop-title-container h2 {
            display: flex;
            align-items: center;
            margin: 0;
        }

        .timer-text {
            font-size: 14px;
            font-weight: normal;
            color: #a0a0a0;
            cursor: help;
            position: relative;
            margin-left: 5px;
        }

        .mythic-items-grid {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            width: 100%;
        }

        .mythic-item-card {
            flex: 1;
            min-width: 0;
            background: rgba(20, 20, 35, 0.9);
            border: 1px solid rgba(167, 139, 250, 0.15);
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s, border-color 0.3s;
        }

        .mythic-item-card:hover {
            transform: translateY(-5px);
            border-color: #ffffff;
        }

        .mythic-item-img-box {
            position: relative;
            height: 110px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
        }

        .mythic-item-img-box img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            border-radius: 5px;
        }

        .mythic-item-info {
            padding: 10px;
            text-align: center;
        }

        .mythic-item-name {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #eee;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mythic-item-price {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* =========================================
           5. 전적 검색 결과 영역
           ========================================= */
        #result-container {
            display: none;
            max-width: 1300px;
            margin: 40px auto;
            padding-bottom: 50px;
            animation: fadeIn 0.6s ease;
        }

        .pix-content-wrap {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .pix-sidebar {
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .pix-main {
            flex: 1;
            min-width: 0;
        }

        .pix-box {
            background: #1a1a2e;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .pix-tier-box {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .pix-tier-icon {
            width: 72px;
            height: 72px;
            background: #2b1a52;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .pix-tier-icon img { width: 100%; height: 100%; object-fit: contain; }
        
        .pix-tier-info h3 { font-size: 12px; color: #9aa4af; margin-bottom: 2px; }
        .pix-tier-info .tier-rank { font-size: 18px; font-weight: bold; color: #a78bfa; }
        .pix-tier-info .lp { font-size: 12px; color: #8fa3b0; }
        
        .profile-header {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #2b1a52, #161625);
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid rgba(107, 70, 193, 0.4);
        }

        .profile-icon {
            width: 85px;
            height: 85px;
            border-radius: 15px;
            border: 3px solid #6b46c1;
        }

        .profile-info { margin-left: 25px; }
        .profile-info h2 { font-size: 30px; }

        .filter-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(107, 70, 193, 0.4);
            border-radius: 20px;
            color: #ccc;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .filter-btn:hover { background: rgba(107, 70, 193, 0.2); }
        .filter-btn.active {
            background: #6b46c1;
            color: white;
            border-color: #a78bfa;
            box-shadow: 0 0 10px rgba(107, 70, 193, 0.5);
        }

        /* 6. 전적 리스트 아이템 */
        .game-item {
            display: flex;
            align-items: center;
            background: #1a1a2e;
            margin-bottom: 12px;
            padding: 15px 25px;
            border-radius: 10px;
            border-left: 8px solid #444;
            transition: transform 0.2s;
        }

        .game-item:hover { transform: translateX(5px); }
        .game-item.win { border-left-color: #4e76ff; background: #1e254a; }
        .game-item.lose { border-left-color: #ff4e4e; background: #2d1a1a; }

        .champ-img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 2px solid #6b46c1;
            margin-right: 20px;
        }

        .game-status { width: 80px; font-weight: bold; text-align: center; }
        .kda-area { flex-grow: 1; text-align: center; }
        
        .item-list {
            display: flex;
            gap: 3px;
            margin-left: 20px;
            min-width: 220px;
        }

        .item-icon {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 7. 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; border-radius: 8px; }
        ::-webkit-scrollbar-thumb { background: #6b46c1; border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: #a78bfa; }

        /* 8. 랭킹 탭 스타일 */
        .ranking-title {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            color: #ffffff;
            font-size: 28px;
            text-shadow: 0 0 10px rgba(250, 204, 21, 0.3);
            cursor: help;
            width: fit-content;
            margin: 0 auto;
        }

        /* 9. 게임 매치 상세 정보 레이아웃 (pix.gg 스타일) */
        .pix-game {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            border-radius: 4px;
            font-size: 12px;
            color: #9aa4af;
            height: 96px;
        }

        .pix-game.win { background: #28344e; border-left: 6px solid #5383e8; }
        .pix-game.lose { background: #59343b; border-left: 6px solid #e84057; }
        .pix-game.remake { background: #2b2b31; border-left: 6px solid #7b7a8e; }

        .pix-info {
            width: 105px;
            padding: 0 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .pix-info .queue { font-weight: bold; color: #fff; }
        .pix-info .win-text { font-weight: bold; color: #5383e8; font-size: 13px; }
        .pix-game.lose .pix-info .win-text { color: #e84057; }
        .pix-game.remake .pix-info .win-text { color: #7b7a8e; }

        .pix-info .bar {
            width: 30px;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 3px 0;
        }

        .pix-champ {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 140px;
        }

        .pix-champ-icon {
            position: relative;
            width: 48px;
            height: 48px;
        }

        .pix-champ-icon img { width: 100%; height: 100%; border-radius: 2px; }

        .pix-level {
            position: absolute;
            bottom: -2px;
            right: -2px;
            background: #202d37;
            color: #fff;
            font-size: 11px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        .pix-spells { display: flex; flex-direction: column; gap: 2px; }
        .pix-spells img { width: 22px; height: 22px; border-radius: 3px; }

        .pix-kda {
            width: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .pix-kda-score { font-size: 15px; font-weight: bold; color: #fff; letter-spacing: 1px; }
        .pix-kda-score .d { color: #e84057; }
        .pix-kda-ratio { color: #8fa3b0; font-weight: bold; }

        .pix-stats {
            width: 110px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            padding-left: 12px;
        }

        .pix-stats .kp { color: #e84057; font-weight: bold; }

        .pix-items-box {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 180px;
        }

        .pix-items { display: flex; gap: 2px; }
        .pix-items img, .pix-items .empty {
            width: 22px;
            height: 22px;
            border-radius: 3px;
            background: rgba(0, 0, 0, 0.3);
        }
        .pix-items .trinket { border-radius: 50%; margin-left: 2px; }

        .pix-badges { display: flex; gap: 4px; }
        .pix-badge {
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
            color: #fff;
        }
        .pix-badge.red { background: #e84057; }
        .pix-badge.green { background: #00bba3; }

        .pix-players {
            display: flex;
            gap: 10px;
            flex-grow: 1;
            padding-left: 15px;
        }
        .pix-team { display: flex; flex-direction: column; gap: 2px; width: 85px; }
        .pix-player { display: flex; align-items: center; gap: 4px; }
        .pix-player img { width: 16px; height: 16px; border-radius: 3px; }
        .pix-player span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 11px;
            color: #9aa4af;
        }

        /* =========================================
           10. 공용 툴팁 컴포넌트
           ========================================= */
        [data-tooltip] {
            position: relative;
            cursor: help;
        }

        [data-tooltip]::after {
            content: attr(data-tooltip) !important;
            position: absolute !important;
            bottom: 130% !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            background-color: rgba(0, 0, 0, 0.8) !important;
            color: white !important;
            padding: 6px 10px !important;
            border-radius: 4px !important;
            font-size: 12px !important;
            font-weight: normal !important;
            white-space: nowrap !important;
            opacity: 0 !important;
            visibility: hidden !important;
            transition: opacity 0.2s ease !important;
            pointer-events: none !important;
            z-index: 9999 !important;
            box-shadow: none !important;
            text-shadow: none !important;
        }

        [data-tooltip]:hover::after {
            opacity: 1 !important;
            visibility: visible !important;
        }
    </style>
</head>

<body>
    <header class="header">
        <a class="logo-top" onclick="goLobby(); setActiveNav('nav-search')">
            <img src="/logo.png" alt="pix.gg" class="nav-logo-img">
        </a>
        <nav class="nav-menu">
            <a class="nav-item active" id="nav-search" onclick="goLobby(); setActiveNav('nav-search')">전적검색</a>
            <a class="nav-item" id="nav-stats" onclick="alert('준비 중인 기능입니다!'); setActiveNav('nav-stats')">통계</a>
            <a class="nav-item" id="nav-ranking" onclick="showRanking(); setActiveNav('nav-ranking')">랭킹</a>
            <a class="nav-item" id="nav-masters" onclick="alert('준비 중인 기능입니다!'); setActiveNav('nav-masters')">장인랭킹</a>
        </nav>
    </header>

    <main>
        <div class="main-search-section" id="search-section">
            <img src="/logo.png" alt="pix.gg logo" class="main-logo-img">

            <div class="search-box">
                <input type="text" class="search-input" id="summoner-input" placeholder="소환사명 검색 (예: Hide on bush#KR1)">
                <button class="search-btn" id="search-btn">.GG</button>
            </div>

            <div id="mythic-shop-container" class="mythic-shop-container">
                <div class="shop-title-container">
                    <img src="https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/v1/rarity-gem-icons/mythic.png" style="width: 22px; height: 22px;">
                    <h3>오늘의 신화 상점</h3>
                    <h2>
                        <span id="shop-timer" class="timer-text" data-tooltip="매일 오전 9시 초기화">00:00:00 뒤 초기화</span>
                    </h2>
                </div>
                <div id="mythic-items" class="mythic-items-grid"></div>
            </div>
        </div>

        <div id="result-container">
            <div id="user-profile"></div>
            <div class="pix-content-wrap">
                <div class="pix-sidebar" id="sidebar-area"></div>
                <div class="pix-main" id="main-area">
                    <div class="filter-container" id="filter-area">
                        <button class="filter-btn active" onclick="toggleFilter(this, '전체')">전체</button>
                        <button class="filter-btn" onclick="toggleFilter(this, '솔로랭크')">솔로랭크</button>
                        <button class="filter-btn" onclick="toggleFilter(this, '자유랭크')">자유랭크</button>
                        <button class="filter-btn" onclick="toggleFilter(this, '칼바람')">칼바람</button>
                        <button class="filter-btn" onclick="toggleFilter(this, '일반')">일반</button>
                        <button class="filter-btn" onclick="toggleFilter(this, '아레나')">아레나</button>
                    </div>
                    <div class="match-list" id="game-list"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 전역 변수 설정
        let ddragonVersion = "14.4.1"; 
        let allMatches = [];
        let activeFilters = [];

        // ==========================================
        // 1. 초기화 및 이벤트 리스너
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            loadMythicShop();
            updateShopTimer();
            setInterval(updateShopTimer, 1000);

            // 주소창(URL) 파싱을 통한 다이렉트 접근 처리
            const pathParts = window.location.pathname.split('/');
            if (pathParts[1] === 'summoner' && pathParts[2]) {
                const summonerName = decodeURIComponent(pathParts[2]);
                document.getElementById('summoner-input').value = summonerName;
                executeSearch(); 
            }
            else if (pathParts[1] === 'ranking') {
                showRanking();
            }
        });

        // 브라우저 뒤로가기/앞으로가기 제어 (History API 동기화)
        window.addEventListener('popstate', (event) => {
            const currentPath = window.location.pathname;

            if (currentPath.startsWith('/summoner/')) {
                const summonerName = decodeURIComponent(currentPath.split('/')[2]);
                document.getElementById('summoner-input').value = summonerName;
                executeSearch();
                setActiveNav('nav-search');
            }
            else if (currentPath === '/ranking') {
                showRanking();
                setActiveNav('nav-ranking');
            }
            else {
                document.getElementById('result-container').style.display = "none";
                document.getElementById('search-section').style.display = "flex";
                document.getElementById('summoner-input').value = "";
                setActiveNav('nav-search');
            }
        });

        // ==========================================
        // 2. 외부 데이터 연동 함수 (신화 상점)
        // ==========================================
        function loadMythicShop() {
            // 주기적인 하드코딩 업데이트가 필요한 데이터셋
            const mythicItems = [
                {
                    name: "프레스티지 바다의 노래 세라핀",
                    price: 25,
                    imgUrl: "https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/assets/loadouts/summoneremotes/events/oceansong/em_prestige_ocean_song_seraphine_inventory.png"
                },
                {
                    name: "2021 프로젝트: 이벤트 아이콘",
                    price: 5,
                    imgUrl: "https://ddragon.leagueoflegends.com/cdn/14.4.1/img/profileicon/4982.png"
                },
                {
                    name: "연미복 말자하 크로마 아이콘",
                    price: 5,
                    imgUrl: "https://ddragon.leagueoflegends.com/cdn/14.4.1/img/profileicon/5198.png"
                },
                {
                    name: "헤헤헤",
                    price: 25,
                    imgUrl: "https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/assets/loadouts/summoneremotes/events/darkstar/em_darkstar_lux_inventory.png"
                }
            ];

            const container = document.getElementById('mythic-items');
            const meIcon = "https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/v1/rarity-gem-icons/mythic.png";

            let htmlString = "";
            mythicItems.forEach(item => {
                htmlString += `
                    <div class="mythic-item-card">
                        <div class="mythic-item-img-box">
                            <img src="${item.imgUrl}" onerror="this.src='https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/v1/hextech-images/chest.png'">
                        </div>
                        <div class="mythic-item-info">
                            <span class="mythic-item-name" title="${item.name}">${item.name}</span>
                            <div class="mythic-item-price">
                                <img src="${meIcon}" style="width: 13px; height: 13px;">
                                <span style="color: #facc15; font-size: 14px; font-weight: 700;">${item.price}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = htmlString;
        }

        // 오전 9시 초기화 타이머 렌더링
        function updateShopTimer() {
            const now = new Date();
            const nextReset = new Date();
            nextReset.setHours(9, 0, 0, 0);

            if (now > nextReset) {
                nextReset.setDate(nextReset.getDate() + 1);
            }

            const diff = nextReset - now;
            const hours = String(Math.floor((diff / (1000 * 60 * 60)) % 24)).padStart(2, '0');
            const minutes = String(Math.floor((diff / 1000 / 60) % 60)).padStart(2, '0');
            const seconds = String(Math.floor((diff / 1000) % 60)).padStart(2, '0');

        // ==========================================
        // 3. 전적 검색 핵심 로직
        // ==========================================

            const inputName = document.getElementById('summoner-input').value;

                alert("닉네임#태그 형식으로 입력해주세요.");
                return;
            }

            const searchSection = document.getElementById('search-section');
            const resultContainer = document.getElementById('result-container');
            const profileDiv = document.getElementById('user-profile');

            try {
                // API 데이터 호출
                const response = await fetch(`/api/summoner/${encodeURIComponent(inputName)}`);
                const data = await response.json();

                if (data.error) {
                    alert(data.error);
                    return;
                }

                ddragonVersion = data.version || ddragonVersion;
                allMatches = data.history || [];
                activeFilters = [];

                // 뷰어 전환: 메인 숨김, 결과 컨테이너 노출
                searchSection.style.display = "none";

                const sidebarArea = document.getElementById('sidebar-area');

                // 프로필 헤더 렌더링

                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                renderMatches(allMatches);

                // 전적 갱신 타이머 로직 제어
                const refreshBtn = document.getElementById('refresh-btn');
                const refreshText = document.getElementById('refresh-timer-text');
                const expireAt = data.expireAt; 

                refreshBtn.addEventListener('click', () => {
                    executeSearch(); 
                });

                function updateRefreshTimer() {
                    if (!expireAt) return;
                    const now = Date.now();
                    const diff = expireAt - now;

                    if (diff <= 0) {
                        refreshBtn.disabled = false;
                        refreshBtn.style.background = "#6b3f8e";
                        refreshBtn.style.cursor = "pointer";
                        refreshText.innerText = "지금 갱신 가능";
                        clearInterval(window.refreshTimerInterval);

                        refreshBtn.disabled = true;
                        refreshBtn.style.background = "#444";

                        const mins = Math.floor(diff / 1000 / 60);
                        const secs = Math.floor((diff / 1000) % 60);

                        refreshText.innerText = `${mins}분 ${formattedSecs}초 뒤 갱신 가능`;
                    }
                }

                updateRefreshTimer();

                const newUrl = `/summoner/${encodeURIComponent(inputName)}`;

        // ==========================================

        function toggleFilter(btn, type) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const games = document.querySelectorAll('.pix-game');
            let visibleCount = 0; 

            games.forEach(game => {
                if (type === '전체') {
                    game.style.display = 'flex';
                    visibleCount++;
                } else {
                    const queueType = game.querySelector('.queue').innerText;
                    if (queueType.includes(type)) {
                        game.style.display = 'flex';
                        visibleCount++;
                    } else {
                        game.style.display = 'none';
                    }
                }
            });

            // 필터링 결과 없음 처리
            const listDiv = document.getElementById('game-list');
            let emptyMsg = document.getElementById('empty-filter-msg');
            
            if (visibleCount === 0) {
                if (!emptyMsg) {
                    emptyMsg = document.createElement('div');
                    emptyMsg.id = 'empty-filter-msg';
                    emptyMsg.style.cssText = "text-align: center; padding: 60px 0; color: #9aa4af; line-height: 1.6;";
                    emptyMsg.innerHTML = "전적 데이터가 없습니다.<br><span style='font-size: 12px; color: #777;'>(최근 10게임 기준)</span>";
                    listDiv.appendChild(emptyMsg);
                }
                emptyMsg.style.display = 'block';
            } else {
                if (emptyMsg) {
                    emptyMsg.style.display = 'none';
                }
            }
        }

            if (window.location.pathname !== '/') {

            document.getElementById('summoner-input').value = "";

            if (window.refreshTimerInterval) clearInterval(window.refreshTimerInterval);
        }

                <div style="max-height: 600px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; background: #1a1a2e;">
                    <table style="width:100%; border-collapse: collapse; font-size: 14px;">
                        <thead style="background: #2b1a52; color: #a78bfa; position: sticky; top: 0; z-index: 10;">
                            <tr>
                                <th style="padding: 15px;">#</th>
                                <th style="padding: 15px; text-align: left;">소환사</th>
                                <th style="padding: 15px;">LP</th>
                                <th style="padding: 15px;">승률</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                data.players.forEach((player, index) => {
                    const total = player.wins + player.losses;
                    const winRate = total > 0 ? ((player.wins / total) * 100).toFixed(1) : 0;

                    tableHtml += `
                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                        <td style="padding: 12px; color: #777; text-align: center;">${index + 1}</td>
                        <td style="padding: 12px; text-align: left; font-weight: bold; color: #ddd;">${player.displayName}</td>
                        <td style="padding: 12px; color: #facc15; text-align: center;">${player.leaguePoints}</td>
                        <td style="padding: 12px; text-align: center;">
                            <span style="color: ${winRate >= 55 ? '#f87171' : '#60a5fa'}">${winRate}%</span>
                            <span style="font-size: 11px; color: #555; margin-left: 4px;">(${player.wins}W ${player.losses}L)</span>
                        </td>
                    </tr>
                    `;
                });

                tableHtml += `</tbody></table></div>`;
                listDiv.innerHTML = tableHtml;

            } catch (e) {
                console.error(e);
                listDiv.innerHTML = `<div style='text-align:center; padding:50px; color:#f87171;'>데이터 로드 실패: ${e.message}</div>`;
            }
        }

        function setActiveNav(navId) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });

            const activeItem = document.getElementById(navId);
            if (activeItem) {
                activeItem.classList.add('active');
            }
        }
    </script>
</body>

</html>
